<!-- Floating Button -->
@if (!isOpen()) {
<button (click)="toggleChat()"
    class="fixed bottom-6 right-6 w-14 h-14 bg-gradient-to-r from-violet-600 to-indigo-600 rounded-full shadow-lg shadow-indigo-300 flex items-center justify-center text-white hover:scale-105 transition-transform z-50">
    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
    </svg>
</button>
}

<!-- Chat Panel -->
@if (isOpen()) {
<div
    [class]="isExpanded() ? 'fixed inset-4 md:inset-10 z-50 bg-white rounded-2xl shadow-2xl flex flex-col border border-slate-200' : 'fixed bottom-6 right-6 w-[350px] h-[550px] z-50 bg-white rounded-2xl shadow-2xl flex flex-col border border-slate-200'">

    <!-- Header -->
    <div
        class="px-4 py-3 bg-gradient-to-r from-violet-600 to-indigo-600 text-white rounded-t-2xl flex items-center justify-between shadow-sm shrink-0">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center font-bold text-sm">AI</div>
            <div>
                <h3 class="font-bold text-sm leading-tight">KioAI Asistente</h3>
                <p class="text-[10px] text-indigo-100">Powered by Gemini</p>
            </div>
        </div>
        <div class="flex items-center gap-1">
            <button (click)="toggleExpand()" class="p-1.5 hover:bg-black/10 rounded-md transition-colors"
                title="Expandir/Reducir">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                </svg>
            </button>
            <button (click)="toggleChat()" class="p-1.5 hover:bg-black/10 rounded-md transition-colors" title="Cerrar">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Messages -->
    <div #scrollContainer class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50">
        @for (msg of messages(); track $index) {
        <div [class]="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
            <div
                [class]="msg.role === 'user' ? 'bg-indigo-600 text-white p-3 rounded-2xl rounded-tr-sm max-w-[85%] text-sm shadow-sm' : 'bg-white border border-slate-200 text-slate-700 p-3 rounded-2xl rounded-tl-sm max-w-[85%] text-sm shadow-sm whitespace-pre-wrap'">
                {{ msg.content }}
            </div>
        </div>
        }
        @if (isTyping()) {
        <div class="flex justify-start">
            <div
                class="bg-white border border-slate-200 text-slate-500 py-2 px-4 rounded-2xl rounded-tl-sm max-w-[85%] text-sm shadow-sm flex gap-1 items-center h-10 w-16">
                <div class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0s"></div>
                <div class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                <div class="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
            </div>
        </div>
        }
    </div>

    <!-- Input -->
    <div class="p-3 bg-white border-t border-slate-100 rounded-b-2xl shrink-0">
        <div
            class="flex items-center gap-2 bg-slate-50 rounded-xl border border-slate-200 px-3 py-2 pr-2 focus-within:border-indigo-400 focus-within:ring-1 focus-within:ring-indigo-400 transition-all">
            <input type="text" [ngModel]="userInput()" (ngModelChange)="userInput.set($event)"
                (keyup.enter)="sendMessage()" placeholder="Pregúntale a KioAI..."
                class="flex-1 bg-transparent border-none outline-none text-sm text-slate-700 placeholder-slate-400">
            <button (click)="sendMessage()" [disabled]="!userInput().trim() || isTyping()"
                class="w-8 h-8 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white rounded-lg flex items-center justify-center transition-colors shadow-sm">
                <svg class="w-4 h-4 ml-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </div>
    </div>

</div>
}
