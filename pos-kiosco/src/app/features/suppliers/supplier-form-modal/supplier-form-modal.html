@if (isOpen) {
<div class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <!-- Backdrop -->
    <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-slate-500 bg-opacity-75 transition-opacity" (click)="cancel()"></div>

        <!-- Panel -->
        <div
            class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full">

            <!-- Header -->
            <div class="bg-indigo-600 px-6 py-4">
                <h3 class="text-lg font-bold text-white">
                    {{ supplierToEdit ? 'Editar Distribuidor' : 'Nuevo Distribuidor' }}
                </h3>
            </div>

            <!-- Body -->
            <form [formGroup]="form" (ngSubmit)="save()" class="p-6 space-y-6">

                <!-- Nombre y CUIT -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre Comercial *</label>
                        <input type="text" formControlName="name"
                            class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="Ej: Distribuidora Sol">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">CUIT / Identificación</label>
                        <input type="text" formControlName="cuit"
                            class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="Ej: 30-12345678-9">
                    </div>
                </div>

                <!-- Contacto -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Celular / WhatsApp</label>
                        <input type="tel" formControlName="phone"
                            class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="Ej: 11 1234 5678">
                        <p class="mt-1 text-xs text-slate-500">
                            Ingresalo desde el 11, sin 0 ni 15. <br>
                            <span class="text-slate-400">Ej: 11 2345 6789</span>
                        </p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                        <input type="email" formControlName="email"
                            class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500"
                            placeholder="contacto@empresa.com">
                    </div>
                </div>

                <!-- Logística -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Dirección</label>
                        <input type="text" formControlName="address"
                            class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div class="sm:col-span-2 space-y-4">
                        <!-- Order Days -->
                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <label class="block text-sm font-bold text-blue-800 mb-3 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                                </svg>
                                Días de Pedido (¿Cuándo le pido?)
                            </label>
                            <div class="flex flex-wrap gap-2">
                                @for (day of weekDays; track day.value) {
                                <button type="button" (click)="toggleDay(day.value, 'order')"
                                    [class.bg-blue-600]="isDaySelected(day.value, 'order')"
                                    [class.text-white]="isDaySelected(day.value, 'order')"
                                    [class.bg-white]="!isDaySelected(day.value, 'order')"
                                    [class.text-blue-700]="!isDaySelected(day.value, 'order')"
                                    class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all border border-blue-200 hover:border-blue-400">
                                    {{ day.label }}
                                </button>
                                }
                            </div>
                        </div>

                        <!-- Delivery Days -->
                        <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                            <label class="block text-sm font-bold text-indigo-800 mb-3 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                Días de Entrega/Visita (¿Cuándo viene?)
                            </label>
                            <div class="flex flex-wrap gap-2">
                                @for (day of weekDays; track day.value) {
                                <button type="button" (click)="toggleDay(day.value, 'delivery')"
                                    [class.bg-indigo-600]="isDaySelected(day.value, 'delivery')"
                                    [class.text-white]="isDaySelected(day.value, 'delivery')"
                                    [class.bg-white]="!isDaySelected(day.value, 'delivery')"
                                    [class.text-indigo-700]="!isDaySelected(day.value, 'delivery')"
                                    class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all border border-indigo-200 hover:border-indigo-400">
                                    {{ day.label }}
                                </button>
                                }
                            </div>
                        </div>

                        <input type="hidden" formControlName="visitDays"> <!-- Hidden binding -->
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Notas Adicionales</label>
                    <textarea formControlName="contactInfo" rows="3"
                        class="block w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>

                <!-- Footer -->
                <div class="pt-4 flex justify-end gap-3 border-t border-slate-100">
                    <button type="button" (click)="cancel()"
                        class="px-4 py-2 bg-white text-slate-700 border border-slate-300 rounded-lg hover:bg-slate-50 font-medium">
                        Cancelar
                    </button>
                    <button type="submit" [disabled]="form.invalid || isSubmitting()"
                        class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium disabled:opacity-50 flex items-center">
                        @if (isSubmitting()) {
                        <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        }
                        Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
}
