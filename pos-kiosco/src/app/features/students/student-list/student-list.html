<div class="h-full flex flex-col bg-slate-50">
    <header
        class="bg-white border-b border-indigo-100 px-8 py-5 flex items-center justify-between shadow-sm sticky top-0 z-10">
        <div class="flex items-center gap-4">
            <div class="p-3 bg-indigo-50 rounded-xl">
                <lucide-angular [img]="UsersIcon" class="w-6 h-6 text-indigo-600"></lucide-angular>
            </div>
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Alumnos</h1>
                <p class="text-slate-500 font-medium">Gestión de cuentas y saldos</p>
            </div>
        </div>

        <div class="relative max-w-md w-full">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                <lucide-angular [img]="SearchIcon" class="w-5 h-5"></lucide-angular>
            </div>
            <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="search()"
                placeholder="Buscar alumno por nombre..."
                class="w-full pl-11 pr-4 py-3 bg-slate-100 border-none rounded-xl text-slate-600 font-bold focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all placeholder:font-medium">
        </div>
    </header>

    <div class="flex-1 overflow-auto p-8 relative">
        <!-- Loading Spinner Overlay -->
        <div *ngIf="loading"
            class="absolute inset-0 bg-white/50 backdrop-blur-sm z-20 flex items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-100 border-t-indigo-600"></div>
        </div>

        <div *ngIf="students.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div *ngFor="let student of students"
                class="bg-white rounded-2xl border border-slate-100 p-5 shadow-sm hover:shadow-md hover:border-indigo-200 transition-all cursor-pointer group"
                [routerLink]="['/students', student.id]">

                <div class="flex justify-between items-start mb-4">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-lg font-bold text-slate-500 group-hover:bg-indigo-50 group-hover:text-indigo-600 transition-colors">
                            {{ student.firstName.charAt(0) }}{{ student.lastName.charAt(0) }}
                        </div>
                        <div>
                            <h3 class="font-bold text-slate-800 group-hover:text-indigo-700 transition-colors">{{
                                student.firstName }} {{ student.lastName }}</h3>
                            <p class="text-xs font-bold text-slate-400 uppercase">
                                {{ student.documentNumber || 'Sin DNI' }}
                            </p>
                        </div>
                    </div>
                </div>

                <div class="bg-indigo-50/50 rounded-xl p-4 border border-indigo-100">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold text-indigo-400 uppercase tracking-widest">Saldo</span>
                        <span class="text-lg font-black"
                            [ngClass]="{'text-emerald-500': student.balanceCents >= 0, 'text-red-500': student.balanceCents < 0}">
                            {{ student.balanceCents / 100 | currency:'ARS':'symbol':'1.0-0' }}
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div *ngIf="students.length === 0 && !loading"
            class="flex flex-col items-center justify-center h-64 text-slate-400">
            <lucide-angular [img]="UsersIcon" class="w-12 h-12 mb-4 opacity-50"></lucide-angular>
            <p class="font-medium">No se encontraron alumnos</p>
        </div>
    </div>
</div>
