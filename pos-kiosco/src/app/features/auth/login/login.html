<div class="min-h-screen w-full flex bg-slate-50 overflow-hidden font-sans text-slate-900">

  <div
    class="hidden lg:flex flex-1 bg-indigo-950 relative flex-col justify-center items-center text-white p-12 overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-full opacity-20 pointer-events-none">
      <div
        class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl animate-blob">
      </div>
      <div
        class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl animate-blob animation-delay-2000">
      </div>
    </div>

    <div class="relative z-10 text-center space-y-4 select-none cursor-pointer" (click)="onLogoClick()">
      <h1 class="text-6xl font-extrabold tracking-tight">
        KIO
      </h1>
      <p class="text-sm uppercase tracking-[0.3em] text-indigo-300 font-semibold mt-2">Punto de Venta Escolar</p>
      <p class="text-lg text-indigo-200 max-w-md mx-auto leading-relaxed">
        Gestión inteligente, rápida y segura para tu punto de venta escolar.
      </p>
    </div>
  </div>

  <div class="flex-1 flex justify-center items-center p-6 bg-white sm:bg-slate-50">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-slate-100">

      <div class="lg:hidden text-center mb-8">
        <h2 class="text-3xl font-bold text-indigo-900">KIO</h2>
      </div>

      <div class="mb-8">
        <h2 class="text-2xl font-bold text-slate-800">Bienvenido de nuevo</h2>
        <p class="text-slate-500 mt-1">Ingresa tus credenciales para abrir caja.</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <div class="space-y-1">
          <label for="email" class="block text-sm font-medium text-slate-700">Correo Electrónico</label>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-600 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="20" height="16" x="2" y="4" rx="2" />
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
              </svg>
            </div>
            <input id="email" type="email" formControlName="email"
              class="block w-full pl-10 pr-3 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none placeholder:text-slate-400 text-sm sm:text-base"
              placeholder="usuario@escuela.edu"
              [class.border-red-500]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" />
          </div>
          <span *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-xs text-red-500">
            Email inválido
          </span>
        </div>

        <div class="space-y-1">
          <label for="password" class="block text-sm font-medium text-slate-700">Contraseña</label>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-600 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
            </div>
            <input id="password" [type]="showPassword() ? 'text' : 'password'" formControlName="password"
              class="block w-full pl-10 pr-10 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all outline-none placeholder:text-slate-400 text-sm sm:text-base"
              placeholder="••••••••" />
            <button type="button" (click)="togglePassword()"
              class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-indigo-600 cursor-pointer transition-colors focus:outline-none"
              tabindex="-1">
              <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24" />
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68" />
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61" />
                <line x1="2" x2="22" y1="2" y2="22" />
              </svg>
            </button>
          </div>
        </div>

        <div *ngIf="errorMessage()"
          class="p-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm flex items-center gap-2 animate-pulse">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" x2="12" y1="8" y2="12" />
            <line x1="12" x2="12.01" y1="16" y2="16" />
          </svg>
          {{ errorMessage() }}
        </div>

        <div class="flex items-center justify-between py-1">
          <div class="flex items-center">
            <input id="rememberMe" type="checkbox" formControlName="rememberMe"
              class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-300 rounded cursor-pointer transition-colors">
            <label for="rememberMe"
              class="ml-2 block text-sm text-slate-600 cursor-pointer select-none hover:text-indigo-600 transition-colors">
              Recordarme en este dispositivo
            </label>
          </div>
        </div>

        <button type="submit" [disabled]="loginForm.invalid || isLoading()"
          class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-semibold rounded-lg shadow-md shadow-indigo-200 transition-all transform active:scale-95 flex justify-center items-center gap-2">
          <span *ngIf="isLoading()"
            class="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></span>
          <span *ngIf="!isLoading()">Iniciar Sesión</span>
        </button>

      </form>

      <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col items-center gap-4">
        <button type="button" (click)="onForgotPassword()"
          class="text-sm font-medium text-indigo-600 hover:text-indigo-800 hover:underline transition-colors focus:outline-none">
          ¿Olvidaste tu contraseña?
        </button>

        <p class="text-xs text-slate-400">
          Si eres cajero, solicita el restablecimiento a tu supervisor.
        </p>
      </div>

    </div>
  </div>
</div>
