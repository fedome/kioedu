@if (isOpen) {
<div class="fixed inset-0 z-50 overflow-hidden">
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm transition-opacity"
        (mousedown)="$event.target === $event.currentTarget && onClose()"></div>

    <!-- Centering Container: Usamos pointer-events-none para que el click pase al fondo -->
    <div class="flex items-center justify-center min-h-screen p-4 pointer-events-none">
        <!-- Modal Content: Restauramos pointer-events-auto para interactuar -->
        <div
            class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 overflow-hidden transform transition-all pointer-events-auto shadow-indigo-100/20">

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">
                    {{ user ? 'Editar Usuario' : 'Nuevo Usuario' }}
                </h2>
                <button (click)="onClose()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="space-y-4">
                @if (errorMessage()) {
                <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-medium">
                    {{ errorMessage() }}
                </div>
                }

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Nombre Completo</label>
                    <input type="text" [(ngModel)]="name"
                        class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
                        placeholder="Ej: Juan Pérez">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                    <input type="email" [(ngModel)]="email"
                        class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
                        placeholder="juan@ejemplo.com">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">
                        {{ user ? 'Contraseña (dejar en blanco para no cambiar)' : 'Contraseña' }}
                    </label>
                    <input type="password" [(ngModel)]="password"
                        class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition-all"
                        placeholder="••••••••">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Roles</label>
                    <div class="grid grid-cols-2 gap-2">
                        @for (role of availableRoles(); track role.id) {
                        <label
                            class="flex items-center gap-2 p-3 border rounded-xl cursor-pointer hover:bg-slate-50 transition-colors"
                            [class.border-indigo-200]="isRoleSelected(role.name)"
                            [class.bg-indigo-50]="isRoleSelected(role.name)">
                            <input type="checkbox" [checked]="isRoleSelected(role.name)"
                                (change)="toggleRole(role.name)" class="w-4 h-4 text-indigo-600">
                            <span class="text-sm font-medium text-slate-700">{{ role.name }}</span>
                        </label>
                        }
                    </div>
                </div>
            </div>

            <div class="mt-8 flex gap-3">
                <button (click)="onClose()"
                    class="flex-1 px-4 py-2 border border-slate-200 text-slate-600 font-semibold rounded-xl hover:bg-slate-50 transition-all">
                    Cancelar
                </button>
                <button (click)="onSave()" [disabled]="isSaving()"
                    class="flex-1 px-4 py-2 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-lg shadow-indigo-200">
                    {{ isSaving() ? 'Guardando...' : 'Guardar' }}
                </button>
            </div>
        </div>
    </div>
</div>
}
