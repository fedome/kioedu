<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4 transition-all">

  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in duration-300 border border-slate-100">

    <div class="bg-slate-50 px-8 py-6 border-b border-slate-100 text-center">
      <h2 class="text-2xl font-bold text-slate-800 tracking-tight">
        Hola, {{ cashierName() }}
      </h2>
      <p class="text-slate-500 text-sm mt-1 font-medium">
        Es momento de iniciar tu turno.
      </p>
    </div>

    <div class="p-8">

      <div class="mb-8">
        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 text-center">
          Fondo Inicial de Caja
        </label>

        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="text-slate-400 text-2xl font-light">$</span>
          </div>

          <input
            type="number"
            [(ngModel)]="amount"
            (keydown.enter)="confirmOpen()"
            class="block w-full pl-10 pr-4 py-4 bg-slate-50 border-2 border-transparent text-slate-800 placeholder-slate-300 focus:bg-white focus:border-indigo-500 focus:ring-0 rounded-xl text-3xl font-bold text-center transition-all outline-none"
            placeholder="0"
            autofocus
          >
        </div>
        <p class="text-xs text-slate-400 mt-3 text-center">
          Ingresa el monto de efectivo físico disponible.
        </p>
      </div>

      <button
        (click)="confirmOpen()"
        [disabled]="loading"
        class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-95 flex justify-center items-center gap-2"
      >
        @if (loading) {
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        }
        {{ loading ? 'Abriendo Caja...' : 'Abrir Turno' }}
      </button>

      <div class="mt-6 text-center">
        <button
          (click)="logout()"
          class="text-sm text-slate-400 hover:text-slate-600 font-medium transition-colors"
        >
          No eres {{ cashierName() }}? <span class="underline decoration-slate-300 underline-offset-2">Cerrar Sesión</span>
        </button>
      </div>

    </div>
  </div>
</div>
