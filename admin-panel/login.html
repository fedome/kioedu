<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - KioEdu Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>KioEdu Admin Platform</h1>
      <p>Iniciá sesión para gestionar el sistema</p>

      <div id="errorMsg" class="alert-danger"></div>

      <form id="loginForm" class="auth-form">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="admin@kio.app" />
        </div>
        
        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required placeholder="••••••••" />
        </div>

        <button type="submit" class="btn-primary" style="margin-top: 8px;">Ingresar</button>
      </form>
    </div>
  </div>
  <script type="module" src="/src/login.ts"></script>
</body>
</html>
